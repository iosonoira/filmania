name: filmania
description: "Filmania — a cinematic editorial app for tracking movies and TV series."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  dio: ^5.9.2
  envied: ^1.3.4
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.2.0
  json_annotation: ^4.11.0
  riverpod_annotation: ^4.0.2
  supabase_flutter: ^2.12.2
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1
  pretty_dio_logger: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.15
  freezed: ^3.1.0
  json_serializable: ^6.13.0
  envied_generator: ^1.3.4

flutter:
  uses-material-design: true
